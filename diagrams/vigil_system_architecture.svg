<svg width="100%" viewBox="0 0 700 1030" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
<title>Vigil system architecture</title>
<desc>Two-tier voice copilot. The device mic streams audio over LiveKit Cloud (transport + Inference STT). A separate Python LiveKit agent (the brain, the team's own server) detects the wake word, normalizes drug aliases, and routes: Tier 1 is a deterministic Moss keyword lookup with disambiguation and role gating and no LLM; Tier 2 is hybrid Moss retrieval feeding a PII-redacted, grounding-checked Minimax LLM. Both build a spoken_form plus card and speak via Minimax TTS; on any miss either tier returns the safe fallback. Audio and the glance card return to the device.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ═══ DEVICE ═══ -->
<rect x="40" y="24" width="620" height="92" rx="18" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="350" y="46" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Device</text>
<text x="350" y="64" text-anchor="middle" font-size="12" fill="#0F6E56">React Native / Expo thin client</text>
<rect x="70" y="80" width="150" height="28" rx="6" fill="#F5F4ED" stroke="#0F6E56" stroke-width="0.5"/>
<text x="145" y="98" text-anchor="middle" font-size="12" fill="#3D3D3A">Mic (always-on)</text>
<rect x="250" y="80" width="110" height="28" rx="6" fill="#F5F4ED" stroke="#0F6E56" stroke-width="0.5"/>
<text x="305" y="98" text-anchor="middle" font-size="12" fill="#3D3D3A">Speaker</text>
<rect x="400" y="80" width="230" height="28" rx="6" fill="#F5F4ED" stroke="#0F6E56" stroke-width="0.5"/>
<text x="515" y="98" text-anchor="middle" font-size="12" fill="#3D3D3A">Glance card (high-contrast)</text>

<!-- audio down to LiveKit -->
<line x1="350" y1="116" x2="350" y2="162" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.6"/>
<rect x="318" y="128" width="44" height="15" fill="#FFFFFF"/>
<text x="360" y="139" font-size="11" fill="#3D3D3A" opacity="0.8">audio</text>

<!-- ═══ LIVEKIT CLOUD ═══ -->
<rect x="40" y="165" width="620" height="92" rx="18" fill="#EEEDFE" fill-opacity="0.5" stroke="#534AB7" stroke-width="0.75" stroke-dasharray="8 4"/>
<text x="350" y="186" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">LiveKit Cloud</text>
<rect x="75" y="202" width="250" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="200" y="228" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Real-time transport</text>
<rect x="355" y="202" width="270" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="490" y="219" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Inference STT</text>
<text x="490" y="236" text-anchor="middle" font-size="11" fill="#534AB7">deepgram/nova-3</text>

<!-- transcript down to agent -->
<line x1="265" y1="257" x2="265" y2="298" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.6"/>
<rect x="273" y="270" width="66" height="15" fill="#FFFFFF"/>
<text x="276" y="281" font-size="11" fill="#3D3D3A" opacity="0.8">transcript</text>

<!-- ═══ PYTHON AGENT (own server, separate boundary) ═══ -->
<rect x="40" y="300" width="450" height="655" rx="16" fill="none" stroke="#1F1E1D" stroke-opacity="0.35" stroke-width="0.75" stroke-dasharray="6 4"/>
<text x="265" y="320" text-anchor="middle" font-size="14" font-weight="600" fill="#141413">Python LiveKit agent — the brain (your server)</text>

<!-- Wake-word -->
<rect x="130" y="336" width="270" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="265" y="360" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Wake-word detector ("Vigil")</text>
<line x1="265" y1="376" x2="265" y2="389" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<!-- Alias normalizer -->
<rect x="130" y="389" width="270" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="265" y="406" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Alias normalizer</text>
<text x="265" y="423" text-anchor="middle" font-size="11" fill="#5F5E5A">epi → EPINEPHRINE (1:1,000)</text>
<line x1="265" y1="435" x2="265" y2="448" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<!-- Tier router -->
<rect x="130" y="448" width="270" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="265" y="466" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Tier router</text>
<text x="265" y="484" text-anchor="middle" font-size="11" fill="#5F5E5A">dose → Tier 1   ·   else → Tier 2</text>
<path d="M210,496 L210,510 L160,510 L160,519" fill="none" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>
<path d="M320,496 L320,510 L370,510 L370,519" fill="none" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<!-- ═══ TIER 1 (blue, deterministic) ═══ -->
<rect x="72" y="519" width="176" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="160" y="539" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Moss  α = 0</text>
<text x="160" y="556" text-anchor="middle" font-size="11" fill="#185FA5">exact keyword + $eq filter</text>
<line x1="160" y1="569" x2="160" y2="582" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<rect x="72" y="582" width="176" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="160" y="599" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Disambiguation</text>
<text x="160" y="616" text-anchor="middle" font-size="11" fill="#185FA5">resolve · or ask 1 question</text>
<line x1="160" y1="628" x2="160" y2="641" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<rect x="72" y="641" width="176" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="160" y="658" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Role gating</text>
<text x="160" y="675" text-anchor="middle" font-size="11" fill="#185FA5">EMT · AEMT · paramedic</text>

<!-- No LLM badge -->
<rect x="118" y="695" width="84" height="22" rx="11" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="160" y="710" text-anchor="middle" font-size="11" fill="#A32D2D">No LLM, ever</text>
<line x1="160" y1="717" x2="160" y2="763" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<!-- ═══ TIER 2 (coral, LLM-grounded) ═══ -->
<rect x="282" y="519" width="176" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="370" y="539" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Moss  α ≈ 0.6</text>
<text x="370" y="556" text-anchor="middle" font-size="11" fill="#993C1D">hybrid search</text>
<line x1="370" y1="569" x2="370" y2="582" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<rect x="300" y="582" width="140" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="370" y="606" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">PII redact</text>
<line x1="370" y1="622" x2="370" y2="635" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<rect x="282" y="635" width="176" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="370" y="653" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Minimax LLM</text>
<text x="370" y="671" text-anchor="middle" font-size="11" fill="#993C1D">grounded on chunks</text>
<line x1="370" y1="683" x2="370" y2="696" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<rect x="282" y="696" width="176" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="370" y="713" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">Grounding guard</text>
<text x="370" y="730" text-anchor="middle" font-size="11" fill="#993C1D">drop unseen numbers</text>
<line x1="370" y1="742" x2="370" y2="763" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<!-- ═══ SHARED: Response builder → TTS ═══ -->
<rect x="95" y="763" width="300" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="245" y="780" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Response builder</text>
<text x="245" y="797" text-anchor="middle" font-size="11" fill="#5F5E5A">spoken_form + card JSON</text>
<line x1="245" y1="807" x2="245" y2="820" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" opacity="0.45"/>

<rect x="130" y="820" width="230" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="245" y="837" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">Minimax TTS</text>
<text x="245" y="854" text-anchor="middle" font-size="11" fill="#5F5E5A">session.say(spoken_form)</text>

<!-- Safe fallback (both tiers) -->
<rect x="80" y="888" width="330" height="46" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="245" y="905" text-anchor="middle" font-size="12" font-weight="500" fill="#A32D2D">Safe fallback — never guesses</text>
<text x="245" y="922" text-anchor="middle" font-size="11" fill="#A32D2D">"Not in protocol. Contact medical control."</text>

<!-- ═══ EXTERNAL MINIMAX APIs ═══ -->
<rect x="520" y="635" width="140" height="46" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="590" y="654" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Minimax</text>
<text x="590" y="671" text-anchor="middle" font-size="11" fill="#854F0B">LLM API</text>
<rect x="520" y="820" width="140" height="46" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="590" y="839" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Minimax</text>
<text x="590" y="856" text-anchor="middle" font-size="11" fill="#854F0B">TTS API</text>

<!-- agent <-> Minimax LLM -->
<line x1="460" y1="654" x2="518" y2="654" marker-end="url(#arrow)" stroke="#BA7517" stroke-width="0.75"/>
<line x1="518" y1="664" x2="460" y2="664" marker-end="url(#arrow)" stroke="#BA7517" stroke-width="0.75"/>
<!-- agent <-> Minimax TTS -->
<line x1="362" y1="838" x2="518" y2="838" marker-end="url(#arrow)" stroke="#BA7517" stroke-width="0.75"/>
<line x1="518" y1="848" x2="362" y2="848" marker-end="url(#arrow)" stroke="#BA7517" stroke-width="0.75"/>

<!-- ═══ RETURN PATH to device ═══ -->
<path d="M58,842 L24,842 L24,100 L40,100" fill="none" marker-end="url(#arrow)" stroke="#73726C" stroke-width="0.75" stroke-dasharray="5 3" opacity="0.55"/>
<text x="18" y="500" text-anchor="middle" font-size="11" fill="#3D3D3A" opacity="0.6" writing-mode="vertical-rl">audio track + card JSON → device</text>

<!-- ═══ LEGEND ═══ -->
<g transform="translate(60,995)">
  <rect x="0" y="0" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="20" y="11" font-size="12" fill="#3D3D3A">Tier 1 (deterministic)</text>
  <rect x="180" y="0" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="200" y="11" font-size="12" fill="#3D3D3A">Tier 2 (LLM-grounded)</text>
  <rect x="370" y="0" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="390" y="11" font-size="12" fill="#3D3D3A">External API</text>
  <rect x="490" y="0" width="14" height="14" rx="3" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="510" y="11" font-size="12" fill="#3D3D3A">No LLM / fallback</text>
</g>
</svg>
